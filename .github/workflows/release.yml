name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: get_version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "Extracting changelog for version $VERSION"

          # Extract the changelog section for this version
          awk -v version="$VERSION" '
            /^## \[/ {
              if (found) exit;
              if ($0 ~ "\\[" version "\\]") {
                found=1;
                next;
              }
            }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "Error: No changelog entry found for version $VERSION" >&2
            exit 1
          fi
          echo "Release notes:"
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@<FULL_LENGTH_COMMIT_SHA> # Pin to the reviewed commit SHA for the intended v1 release
        with:
          body_path: release_notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
